<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.4" stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FED7AA"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="280" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo + brand -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#logo)"/>
  <rect x="92" y="116" width="9" height="24" rx="2" fill="white"/>
  <rect x="108" y="104" width="9" height="36" rx="2" fill="white"/>
  <rect x="124" y="94" width="9" height="46" rx="2" fill="white"/>
  <text x="172" y="112" font-family="sans-serif" font-size="32" font-weight="700" fill="#1C1917">True Analyzers</text>
  <text x="172" y="142" font-family="sans-serif" font-size="16" font-weight="600" fill="#C2410C" letter-spacing="3">DIGITAL REPORT PDFs</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="sans-serif" font-size="64" font-weight="800" fill="#1C1917">Premium digital report</text>
  <text x="80" y="350" font-family="sans-serif" font-size="64" font-weight="800" fill="#1C1917">PDFs for professionals</text>
  <text x="80" y="420" font-family="sans-serif" font-size="40" font-weight="700" fill="#EA580C">5, 7, or 9 pages</text>

  <!-- Subtext -->
  <text x="80" y="478" font-family="sans-serif" font-size="26" fill="#57534E">One-time payment. No subscription, ever.</text>
  <text x="80" y="514" font-family="sans-serif" font-size="26" fill="#57534E">Sent to your email within 1–2 hours. Trusted by 12,000+.</text>

  <!-- CTA badges -->
  <rect x="80" y="548" width="240" height="56" rx="12" fill="url(#cta)"/>
  <text x="200" y="584" font-family="sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">From £30 one-time</text>
  <rect x="336" y="548" width="280" height="56" rx="12" fill="none" stroke="#FDBA74" stroke-width="2"/>
  <text x="476" y="584" font-family="sans-serif" font-size="24" font-weight="700" fill="#C2410C" text-anchor="middle">30-day guarantee</text>
</svg>
